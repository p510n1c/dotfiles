####### KANAGAWA ##########
 set -g @plugin 'Nybkox/tmux-ukiyo'

# Forțează pluginul să lase fundalul transparent
 set -g @ukiyo-ignore-window-colors true
 set -g @ukiyo-status-background "default"

## Kanagawa variants
#set -g @ukiyo-theme "kanagawa/wave" 
 set -g @ukiyo-theme "kanagawa/dragon"  # darker
#set -g @ukiyo-theme "kanagawa/lotus"   # light

# Configure the ukiyo theme
 set -g @ukiyo-plugins "cpu-usage ram-usage git time"

# Override background colors to match dragon_black_3 (#181616) for consistency
 set -g @ukiyo-color-bg-bar "dragon_black_3"
 set -g @ukiyo-color-bg-pane "dragon_black_3"
